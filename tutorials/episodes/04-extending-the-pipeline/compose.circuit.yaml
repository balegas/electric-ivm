# Episode 4 overlay: EXTEND the todo pipeline with one more cohort dimension.
#
# This is a strict superset of episode 3's compose.circuit.yaml — the same INDEXES and COUNTS,
# plus one new lookup arrangement: `todos.assignee`. That single addition is the whole episode.
# It is the recipe's feed (D) `todos_by_assignee` (docs/building-app-pipelines.md) — the "my
# assigned todos" cohort, keyed by the person a todo is assigned to rather than by its list.
#
# Adding a dimension the circuit already knows how to compile (another lookup index) is a
# DEPLOY, not a code change: append the column and force-recreate the engine —
#
#   docker compose -f compose.yaml -f episodes/04-extending-the-pipeline/compose.circuit.yaml \
#     up -d --force-recreate engine
#
# On boot the circuit's LAYOUT FINGERPRINT changes (one more IndexSpec), so the previous dbsp
# state is discarded and every arrangement RESEEDS from a fresh Postgres REPEATABLE READ snapshot
# — automatic, no error (apps/engine/src/arrangements.rs). The shape catalog (in the `ds` volume)
# survives the recreate, so every open shape replays from it; any membership shape that now
# decomposes over `todos.assignee` is PROMOTED from the fallback tier to circuit-served.
#
# `ELECTRIC_CIRCUITS_DBSP_DIR` stays `/tmp/dbsp` — an ephemeral container path — so a force-recreate
# reseeds even without the fingerprint change. (With a persistent DIR and unchanged config, the
# same restart would be a fast checkpoint restore instead.)

services:
  engine:
    environment:
      ELECTRIC_CIRCUITS_DBSP_DIR: /tmp/dbsp
      ELECTRIC_CIRCUITS_DBSP_INDEXES: "todos.list_id,list_members.user_id,list_members.list_id,todos.assignee"
      ELECTRIC_CIRCUITS_DBSP_COUNTS: "todos:list_id+done"
