# Episode 3 overlay: turn the engine's static dbsp circuit ON.
#
# The circuit is configured by static env vars, NOT by table introspection — so enabling it is a
# deploy-time change, applied on top of the base stack:
#
#   docker compose -f compose.yaml -f episodes/03-serving-model/compose.circuit.yaml \
#     up -d --force-recreate engine
#
# Compose merges this `environment` map into the base `engine` service. Leaving it out of
# compose.yaml keeps the base stack booting cleanly from episode 1's lone `issues` table (an
# empty circuit config against tables that don't exist yet is a needless risk); the reader turns
# the circuit on as an explicit step, which IS the "structure ships with deploys" story the
# engine's docs describe.
#
# INDEXES / COUNTS below are exactly the todo-model pipeline from docs/building-app-pipelines.md:
#   - todos.list_id            → the cohort index the membership shape is served from
#   - list_members.user_id     → the router's filter column (who is in a list)
#   - list_members.list_id     → the router's projection column (which list)
#   - todos:list_id+done       → a live COUNT per (list, done) group — the open-todo badge

services:
  engine:
    environment:
      ELECTRIC_IVM_DBSP: "1"
      ELECTRIC_IVM_DBSP_SERVE: "1"
      ELECTRIC_IVM_DBSP_DIR: /tmp/dbsp
      ELECTRIC_IVM_DBSP_INDEXES: "todos.list_id,list_members.user_id,list_members.list_id"
      ELECTRIC_IVM_DBSP_COUNTS: "todos:list_id+done"
