# Build the Docker images and publish them to the GitHub Container Registry.
#
#   ghcr.io/<owner>/electric-ivm/engine  — the Rust engine (replication ingest, shapes, /v1/shape)
#   ghcr.io/<owner>/electric-ivm/node    — durable-streams server + extended API (CMD selects)
#
# Pushes to main publish `main` + `sha-…` tags; version tags (v*) publish semver tags; pull
# requests build without pushing.
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - name: engine
            dockerfile: docker/Dockerfile.engine
          - name: node
            dockerfile: docker/Dockerfile.node
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
